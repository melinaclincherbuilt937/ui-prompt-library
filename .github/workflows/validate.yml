name: Validate Prompts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Check prompt file structure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all prompt files
        run: |
          ERRORS=0

          check_file() {
            local f="$1"

            # Skip index files
            if [[ "$f" == */README.md ]]; then
              return
            fi
            # Skip template (it has placeholders)
            if [[ "$f" == */PROMPT_TEMPLATE.md ]]; then
              return
            fi

            echo "→ Checking $f"

            if ! grep -q "## 📦 Dependencies" "$f"; then
              echo "  ❌ MISSING: '## 📦 Dependencies' in $f"
              ERRORS=$((ERRORS + 1))
            fi

            if ! grep -q "## 🎨" "$f"; then
              echo "  ❌ MISSING: Design Tokens section in $f"
              ERRORS=$((ERRORS + 1))
            fi

            if ! grep -q "## 🏗️" "$f"; then
              echo "  ❌ MISSING: Page/Component Structure section in $f"
              ERRORS=$((ERRORS + 1))
            fi

            if ! grep -q "## 🏷️ Tags" "$f"; then
              echo "  ❌ MISSING: Tags section in $f"
              ERRORS=$((ERRORS + 1))
            fi

            echo "  ✅ OK"
          }

          for f in saas/*.md components/*.md; do
            [ -f "$f" ] && check_file "$f"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS error(s) found. Fix them before merging."
            exit 1
          else
            echo ""
            echo "✅ All prompt files are valid!"
          fi
